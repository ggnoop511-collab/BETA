<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستكشف الأنسجة الظهارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #040d14; --surface: #0a1628; --border: rgba(0,255,213,0.15); }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: #e2f0ff;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0,255,213,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192,132,252,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
    z-index: 1;
  }
  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, #00ffd5, #c084fc, #ff6b9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: rgba(255,255,255,0.4); font-size: 0.95rem; margin-top: 0.4rem; }
  .map-container {
    position: relative;
    width: 100%;
    max-width: 700px;
    margin: 0 auto 1.5rem;
    padding: 1rem;
    z-index: 1;
  }
  .nodes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    padding: 0.5rem;
  }
  .node {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem 0.8rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .node::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--node-color);
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 14px;
  }
  .node:hover::before, .node.active::before { opacity: 0.08; }
  .node:hover {
    transform: translateY(-4px) scale(1.03);
    border-color: var(--node-color);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px var(--node-color-alpha);
  }
  .node.active {
    border-color: var(--node-color);
    box-shadow: 0 0 0 2px var(--node-color), 0 8px 30px var(--node-color-alpha);
    transform: scale(1.05);
  }
  .node-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    display: block;
    filter: drop-shadow(0 0 8px var(--node-color));
    animation: float 3s ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  .node-label { font-size: 0.7rem; font-weight: 700; color: var(--node-color); display: block; letter-spacing: 0.5px; }
  .node-arabic { font-size: 0.85rem; color: rgba(255,255,255,0.75); margin-top: 0.2rem; display: block; }
  .node.center-node::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 20px;
    border: 2px solid var(--node-color);
    animation: pulse-ring 2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes pulse-ring {
    0% { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.12); }
  }
  .info-panel {
    max-width: 700px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
    z-index: 1;
    position: relative;
  }
  .info-card {
    background: var(--surface);
    border: 1.5px solid var(--active-color, var(--border));
    border-radius: 20px;
    padding: 1.6rem;
    box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 20px var(--card-glow, transparent);
    animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .info-card .card-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .card-icon { font-size: 2.2rem; filter: drop-shadow(0 0 10px var(--active-color)); }
  .card-titles h2 { font-size: 1.2rem; font-weight: 900; color: var(--active-color); }
  .card-titles span { font-size: 0.9rem; color: rgba(255,255,255,0.45); }
  .definition-box {
    background: rgba(255,255,255,0.03);
    border-right: 3px solid var(--active-color);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.8);
  }
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--active-color);
    margin-bottom: 0.6rem;
    opacity: 0.8;
  }
  .characteristics-list { list-style: none; margin-bottom: 1rem; }
  .characteristics-list li {
    padding: 0.45rem 0;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.75);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
    line-height: 1.5;
  }
  .characteristics-list li::before { content: '▸'; color: var(--active-color); flex-shrink: 0; margin-top: 1px; }
  .functions-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
  .tag {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--active-color);
    color: var(--active-color);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    transition: background 0.2s;
  }
  .tag:hover { background: var(--active-color); color: #000; }
  .welcome-card { text-align: center; padding: 2.5rem 1.5rem; color: rgba(255,255,255,0.35); }
  .welcome-card .big-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    animation: spin-slow 8s linear infinite;
    display: block;
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .welcome-card p { font-size: 1rem; }
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: drift linear infinite;
    opacity: 0;
  }
  @keyframes drift {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) translateX(50px); opacity: 0; }
  }
  footer { text-align: center; padding: 1.5rem; color: rgba(255,255,255,0.2); font-size: 0.8rem; position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <h1>🔬 مستكشف الأنسجة الظهارية</h1>
  <p>Histology — Epithelial Tissues · انقر على أي موضوع لاستكشافه</p>
</header>

<div class="map-container">
  <div class="nodes-grid" id="nodesGrid"></div>
</div>

<div class="info-panel">
  <div class="info-card" id="infoCard">
    <div class="welcome-card">
      <span class="big-icon">🧬</span>
      <p>اختر موضوعاً من الأعلى لعرض التفاصيل</p>
    </div>
  </div>
</div>

<footer>Lec. 1-2 Histology · Epithelial Tissues</footer>

<script>
const topics = [
  {
    id: "epithelial", label: "Epithelial Tissue", arabic: "الأنسجة الظهارية",
    color: "#00ffd5", icon: "🧫", center: true,
    info: {
      definition: "طبقة واحدة أو أكثر من الخلايا متعددة الأوجه المتراصة بإحكام مع مصفوفة خارج خلوية قليلة جداً.",
      characteristics: [
        "Cellularity – خلايا مرتبطة بإحكام بواصلات",
        "Polarity – سطح قمي حر + سطح قاعدي ملتصق",
        "Avascularity – لا أوعية دموية، التغذية عبر الانتشار",
        "Innervation – كثيفة التعصيب",
        "High regeneration – انقسام خلوي متكرر"
      ],
      functions: ["الحماية الجسدية", "النفاذية الانتقائية", "الإفراز", "الإحساس"]
    }
  },
  {
    id: "simple", label: "Simple Epithelium", arabic: "الظهارة البسيطة",
    color: "#ff6b9d", icon: "⬜",
    info: {
      definition: "طبقة واحدة من الخلايا. جميع الخلايا تلامس الغشاء القاعدي. توجد في مناطق الإجهاد المنخفض.",
      characteristics: [
        "طبقة خلوية واحدة فقط",
        "جميع الخلايا تلامس الغشاء القاعدي",
        "توجد في الرئة والأمعاء والأوعية الدموية",
        "وظيفتها الرئيسية: الترشيح والامتصاص والإفراز"
      ],
      functions: ["الترشيح", "الامتصاص", "الإفراز", "تبادل الغازات"]
    }
  },
  {
    id: "stratified", label: "Stratified Epithelium", arabic: "الظهارة الطبقية",
    color: "#ffd700", icon: "📚",
    info: {
      definition: "طبقتان أو أكثر. الطبقة القاعدية فقط تلامس الغشاء القاعدي. تشبه جدار من الطوب.",
      characteristics: [
        "طبقات خلوية متعددة",
        "الطبقة القاعدية فقط على الغشاء القاعدي",
        "توجد في الجلد والمريء والبلعوم",
        "الخلايا القاعدية تتجدد باستمرار"
      ],
      functions: ["الحماية من التآكل", "مقاومة الإجهاد الميكانيكي", "وظيفة الحاجز"]
    }
  },
  {
    id: "pseudo", label: "Pseudostratified", arabic: "شبه الطبقية",
    color: "#c084fc", icon: "🌊",
    info: {
      definition: "تبدو طبقية لكن جميع الخلايا تلامس الغشاء القاعدي. أنوية في مستويات مختلفة تعطي مظهراً طبقياً كاذباً.",
      characteristics: [
        "جميع الخلايا ملتصقة بالغشاء القاعدي",
        "ليس كل الخلايا تصل السطح القمي",
        "الأنوية في مستويات مختلفة = مظهر طبقي زائف",
        "تُصنّف ضمن الظهارة البسيطة"
      ],
      functions: ["الإفراز", "الامتصاص", "بطانة الجهاز التنفسي"]
    }
  },
  {
    id: "basement", label: "Basement Membrane", arabic: "الغشاء القاعدي",
    color: "#34d399", icon: "🔗",
    info: {
      definition: "مصفوفة خارج خلوية رفيعة تفصل الظهارة عن النسيج الضام تحتها.",
      characteristics: [
        "Basal lamina: كولاجين + بروتينات + كربوهيدرات",
        "Lamina lucida: طبقة صافية قرب الظهارة",
        "Lamina densa: طبقة كثيفة قرب النسيج الضام",
        "Reticular lamina: يُفرزها النسيج الضام"
      ],
      functions: ["دعم الظهارة", "الربط والتثبيت", "حاجز ميكانيكي", "ترشيح الدم"]
    }
  },
  {
    id: "junctions", label: "Intercellular Junctions", arabic: "الوصلات الخلوية",
    color: "#fb923c", icon: "🔩",
    info: {
      definition: "مناطق تماس متخصصة بين أغشية البلازما للخلايا المتجاورة.",
      characteristics: [
        "Tight junctions – تختم الخلايا، لا يمر شيء",
        "Adherens junction – خيوط أكتين، حزام التصاق",
        "Gap junctions – قنوات بروتينية، تمرير أيونات",
        "Desmosomes – قرصية الشكل، خيوط وسيطة",
        "Hemidesmosomes – نصف ديسموسوم، يربط بالغشاء القاعدي"
      ],
      functions: ["التصاق الخلايا", "التواصل الخلوي", "وظيفة الحاجز", "المتانة الميكانيكية"]
    }
  }
];

let activeId = null;

const grid = document.getElementById('nodesGrid');
topics.forEach((t, i) => {
  const node = document.createElement('div');
  node.className = 'node' + (t.center ? ' center-node' : '');
  node.id = 'node-' + t.id;
  node.style.setProperty('--node-color', t.color);
  node.style.setProperty('--node-color-alpha', t.color + '22');
  node.style.setProperty('--delay', (i * 0.4) + 's');
  node.innerHTML = `
    <span class="node-icon">${t.icon}</span>
    <span class="node-label">${t.label}</span>
    <span class="node-arabic">${t.arabic}</span>
  `;
  node.addEventListener('click', () => showInfo(t));
  grid.appendChild(node);
});

function showInfo(topic) {
  if (activeId === topic.id) {
    activeId = null;
    document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
    document.getElementById('infoCard').innerHTML = `
      <div class="welcome-card">
        <span class="big-icon">🧬</span>
        <p>اختر موضوعاً من الأعلى لعرض التفاصيل</p>
      </div>`;
    document.getElementById('infoCard').style.removeProperty('--active-color');
    document.getElementById('infoCard').style.removeProperty('--card-glow');
    return;
  }

  activeId = topic.id;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.getElementById('node-' + topic.id).classList.add('active');

  const card = document.getElementById('infoCard');
  card.style.setProperty('--active-color', topic.color);
  card.style.setProperty('--card-glow', topic.color + '18');

  const chars = topic.info.characteristics.map(c => `<li>${c}</li>`).join('');
  const funcs = topic.info.functions.map(f => `<span class="tag">${f}</span>`).join('');

  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${topic.icon}</span>
      <div class="card-titles">
        <h2>${topic.label}</h2>
        <span>${topic.arabic}</span>
      </div>
    </div>
    <div class="definition-box">${topic.info.definition}</div>
    <p class="section-title">الخصائص · Characteristics</p>
    <ul class="characteristics-list">${chars}</ul>
    <p class="section-title">الوظائف · Functions</p>
    <div class="functions-tags">${funcs}</div>
  `;
}

// Particles
const particlesEl = document.getElementById('particles');
const colors = ['#00ffd5','#c084fc','#ff6b9d','#ffd700','#34d399','#fb923c'];
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${Math.random()*100}%;
    background: ${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration: ${8 + Math.random()*12}s;
    animation-delay: ${Math.random()*10}s;
    width: ${2 + Math.random()*3}px;
    height: ${2 + Math.random()*3}px;
  `;
  particlesEl.appendChild(p);
}
</script>
</body>
</html>
